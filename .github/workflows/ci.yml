name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        php: [8.2, 8.3, 8.4, 8.5]
        laravel: [11.*, 12.*, 13.*]
        dependency-version: [prefer-stable]
        include:
          - laravel: 11.*
            testbench: 9.*
            pest: ^3.7
            larastan: ^2.9
          - laravel: 12.*
            testbench: 10.*
            pest: ^3.7
            larastan: ^2.9
          - laravel: 13.*
            testbench: 11.*
            pest: ^4.4
            larastan: ^3.0
        exclude:
          - php: 8.2
            laravel: 13.*
          - php: 8.3
            laravel: 13.*
          # Override pest/larastan for PHP 8.3+ on older Laravel if needed
          # But keeping it simple: PHP 8.2 will use the include versions.
          # We need to make sure PHP 8.3+ uses Pest 4.
          - php: 8.3
            laravel: 11.*
          - php: 8.3
            laravel: 12.*
          - php: 8.4
            laravel: 11.*
          - php: 8.4
            laravel: 12.*
          - php: 8.5
            laravel: 11.*
          - php: 8.5
            laravel: 12.*
        # Add back PHP 8.3+ combinations with Pest 4
        include:
          - php: 8.3
            laravel: 11.*
            testbench: 9.*
            pest: ^4.4
            larastan: ^3.0
          - php: 8.3
            laravel: 12.*
            testbench: 10.*
            pest: ^4.4
            larastan: ^3.0
          - php: 8.4
            laravel: 11.*
            testbench: 9.*
            pest: ^4.4
            larastan: ^3.0
          - php: 8.4
            laravel: 12.*
            testbench: 10.*
            pest: ^4.4
            larastan: ^3.0
          - php: 8.5
            laravel: 11.*
            testbench: 9.*
            pest: ^4.4
            larastan: ^3.0
          - php: 8.5
            laravel: 12.*
            testbench: 10.*
            pest: ^4.4
            larastan: ^3.0

    name: P${{ matrix.php }} - L${{ matrix.laravel }} - ${{ matrix.dependency-version }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick, fileinfo
          coverage: none

      - name: 🔍 Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: 💾 Cache dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: 📝 Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: 📦 Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" "pestphp/pest:${{ matrix.pest }}" "larastan/larastan:${{ matrix.larastan }}" --no-interaction --no-update
          composer update --${{ matrix.dependency-version }} --prefer-dist --no-interaction --no-progress

      - name: 💅 Run lint (Pint)
        run: vendor/bin/pint --test

      - name: 🧪 Run static analysis (PHPStan)
        run: vendor/bin/phpstan analyse -c phpstan.neon

      - name: 🚀 Execute tests
        run: vendor/bin/pest
